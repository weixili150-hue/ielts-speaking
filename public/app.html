<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我是世界口活冠军 — 雅思口语考官</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1923;
  color: #e0e8f0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
}
.app {
  width: 100%;
  max-width: 480px;
  background: #0f1923;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* View switching */
.view { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
.view.active { display: flex; }

/* Bottom nav */
.bottom-nav {
  display: flex;
  border-top: 1px solid #1a2a3a;
  flex-shrink: 0;
  background: #0d1520;
}
.nav-item {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 0.7rem;
  color: #556;
  background: none;
  border: none;
  cursor: pointer;
  min-height: 50px;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.nav-item .icon { font-size: 1.2rem; }
.nav-item.active { color: #c9a84c; }

/* ── Home view ── */
.home { padding: 24px 16px; }
.home h2 { font-size: 1.1rem; margin-bottom: 4px; color: #fff; }
.home .subtitle { font-size: 0.8rem; color: #8899aa; margin-bottom: 24px; }

.mode-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
.mode-card {
  background: #1a2530;
  border: 1px solid #1e2d3d;
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.mode-card:active { border-color: #c9a84c; }
.mode-card .icon { font-size: 1.5rem; margin-bottom: 8px; }
.mode-card h3 { font-size: 1rem; margin-bottom: 4px; color: #fff; }
.mode-card p { font-size: 0.8rem; color: #8899aa; line-height: 1.5; }

/* ── Chat view ── */
.chat-view { background: #0a1219; }
.chat-header {
  background: #111d2b;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #1a2a3a;
  flex-shrink: 0;
}
.chat-header .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #c9a84c, #e8c969);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #0f1923; flex-shrink: 0;
}
.chat-header .info { flex: 1; }
.chat-header .name { font-size: 0.85rem; font-weight: 600; }
.chat-header .role { font-size: 0.65rem; color: #8899aa; }
.chat-header .phase { font-size: 0.65rem; color: #c9a84c; border: 1px solid #c9a84c33; padding: 3px 10px; border-radius: 10px; }
.chat-header .btn-end {
  font-size: 0.7rem; color: #e74c3c; background: #e74c3c15;
  border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg .speaker { font-size: 0.65rem; margin-bottom: 3px; }
.msg .bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.5; }
.msg.examiner { align-self: flex-start; }
.msg.examiner .bubble { background: #1a2a3a; color: #e0e8f0; border-bottom-left-radius: 4px; }
.msg.examiner .speaker { color: #8899aa; }
.msg.examiner .speak-btn {
  display: inline-flex; align-items: center; gap: 3px; margin-top: 4px;
  font-size: 0.7rem; color: #c9a84c; background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent; padding: 2px 0;
}
.msg.user { align-self: flex-end; }
.msg.user .bubble { background: #1a3a5c; color: #e0e8f0; border-bottom-right-radius: 4px; }
.msg.user .speaker { color: #667; text-align: right; }

.correction-card {
  background: #1a2010; border-left: 2px solid #c9a84c;
  padding: 10px 12px; border-radius: 4px 8px 8px 4px;
  font-size: 0.75rem; max-width: 90%; align-self: flex-start;
  animation: fadeIn 0.3s ease;
}
.correction-card .title { color: #c9a84c; font-weight: 600; font-size: 0.7rem; margin-bottom: 4px; }
.correction-card .err { color: #e74c3c; text-decoration: line-through; }
.correction-card .fix { color: #27ae60; font-weight: 600; }
.correction-card .natural { color: #8ec98e; font-size: 0.7rem; margin-top: 4px; }

.chat-input-area { padding: 12px 16px; border-top: 1px solid #1a2a3a; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
.chat-input-area textarea {
  flex: 1; padding: 10px 14px; background: #1a2530; border: 1px solid #2a3a4a;
  border-radius: 12px; color: #e0e8f0; font-size: 0.9rem; font-family: inherit;
  outline: none; resize: none; min-height: 44px; max-height: 100px;
}
.chat-input-area textarea:focus { border-color: #c9a84c; }
.chat-input-area button {
  width: 44px; height: 44px; border-radius: 12px; border: none;
  font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center;
}
.btn-send { background: linear-gradient(135deg, #c9a84c, #e8c969); color: #0f1923; }
.btn-mic { background: #1a2a3a; color: #c9a84c; }
.btn-mic.listening { background: #c0392b; color: #fff; }

/* ── Voice conversation view ── */
.voice-view {
  background: #0a1219; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
}
.voice-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #c9a84c, #e8c969);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 700; color: #0f1923;
  margin-bottom: 12px;
}
.voice-status { font-size: 0.85rem; color: #8899aa; margin-bottom: 8px; }
.voice-animation {
  display: flex; gap: 3px; align-items: flex-end; height: 40px; margin-bottom: 20px;
}
.voice-animation .bar {
  width: 4px; background: #c9a84c; border-radius: 2px; transition: height 0.15s;
}
.voice-animation .bar:nth-child(1) { height: 8px; }
.voice-animation .bar:nth-child(2) { height: 16px; }
.voice-animation .bar:nth-child(3) { height: 24px; }
.voice-animation .bar:nth-child(4) { height: 16px; }
.voice-animation .bar:nth-child(5) { height: 8px; }

.voice-btn-end {
  padding: 12px 32px; background: #e74c3c; color: #fff; border: none;
  border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
  -webkit-tap-highlight-color: transparent; margin-top: 8px;
}
.voice-phase { font-size: 0.7rem; color: #c9a84c; border: 1px solid #c9a84c33; padding: 4px 12px; border-radius: 10px; margin-bottom: 16px; }

/* ── Evaluate view ── */
.eval-view { padding: 24px 16px; }
.eval-score-circle {
  width: 100px; height: 100px; border-radius: 50%; border: 3px solid #c9a84c;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.eval-score-circle .score { font-size: 2rem; font-weight: 700; color: #c9a84c; }
.eval-score-circle .label { font-size: 0.65rem; color: #8899aa; }

.eval-sub-scores { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.eval-sub-score { text-align: center; font-size: 0.7rem; color: #8899aa; }
.eval-sub-score .val { font-size: 1rem; font-weight: 600; color: #e0e8f0; }

.eval-section {
  background: #1a2530; border-radius: 10px; padding: 14px; margin-bottom: 12px;
}
.eval-section h4 { font-size: 0.85rem; color: #c9a84c; margin-bottom: 8px; }

.correction-item { margin-bottom: 10px; font-size: 0.8rem; line-height: 1.5; }
.correction-item .orig { color: #e74c3c; display: block; }
.correction-item .corr { color: #27ae60; display: block; }
.correction-item .nat { color: #8ec98e; font-size: 0.75rem; display: block; margin-top: 2px; }

.exp-item { font-size: 0.8rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.exp-item .speak-btn-small {
  font-size: 0.8rem; color: #c9a84c; background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.eval-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-back { flex: 1; padding: 12px; background: #1a2a3a; color: #c9a84c; border: 1px solid #2a3a4a; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-align: center; }

/* ── History view ── */
.history-view { padding: 0; }
.search-bar { padding: 12px 16px; border-bottom: 1px solid #1a2a3a; position: sticky; top: 0; background: #0f1923; z-index: 1; }
.search-bar input {
  width: 100%; padding: 10px 14px; background: #1a2530; border: 1px solid #2a3a4a;
  border-radius: 10px; color: #e0e8f0; font-size: 0.85rem; font-family: inherit; outline: none;
}
.search-bar input:focus { border-color: #c9a84c; }
.history-count { font-size: 0.7rem; color: #556; padding: 8px 16px; }
.history-list { flex: 1; overflow-y: auto; }
.history-card {
  padding: 14px 16px; border-bottom: 1px solid #1a2a3a; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.history-card:active { background: #111d2b; }
.history-card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.history-card .date { font-size: 0.7rem; color: #556; }
.history-card .mode-tag { font-size: 0.6rem; padding: 2px 8px; border-radius: 8px; }
.history-card .mode-tag.free-talk { background: #1a3a1a; color: #27ae60; }
.history-card .mode-tag.ielts-topics { background: #1a2a3a; color: #3498db; }
.history-card .mode-tag.mock-test { background: #3a2a1a; color: #c9a84c; }
.history-card .topic { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
.history-card .scores { font-size: 0.7rem; color: #c9a84c; }

.history-detail { padding: 20px 16px; }
.history-detail .back-btn {
  font-size: 0.85rem; color: #c9a84c; background: none; border: none;
  margin-bottom: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
}

/* Toast */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 8px; color: #fff; font-size: 0.8rem;
  z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }

/* Empty state */
.empty { text-align: center; color: #445; padding: 60px 20px; font-size: 0.85rem; }

/* Loading */
.loading { text-align: center; padding: 40px; }
.loading .dots { display: flex; gap: 4px; justify-content: center; }
.loading .dot { width: 6px; height: 6px; background: #c9a84c; border-radius: 50%; animation: bounce 1s infinite; }
.loading .dot:nth-child(2) { animation-delay: 0.2s; }
.loading .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

.interaction-choice { text-align: center; padding: 24px 16px; }
.interaction-choice h3 { font-size: 1rem; margin-bottom: 20px; }
.interaction-choice .choice-card {
  background: #1a2530; border: 1px solid #2a3a4a; border-radius: 12px;
  padding: 20px; margin-bottom: 12px; cursor: pointer; text-align: left;
}
.interaction-choice .choice-card:active { border-color: #c9a84c; }
.interaction-choice .choice-card h4 { font-size: 0.9rem; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.interaction-choice .choice-card p { font-size: 0.75rem; color: #8899aa; line-height: 1.5; }
</style>
</head>
<body>
<div class="app">
  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="home">
      <h2>🏆 我是世界口活冠军</h2>
      <p class="subtitle">James Mitchell · IELTS Examiner · 15 years</p>
      <div class="mode-cards"></div>
    </div>
  </div>

  <!-- CHAT (Mode A) -->
  <div class="view" id="view-chat">
    <div class="chat-view" style="flex:1;display:flex;flex-direction:column">
      <div class="chat-header">
        <div class="avatar">J</div>
        <div class="info"><div class="name">James Mitchell</div><div class="role">IELTS Examiner</div></div>
        <span class="phase" id="phaseTag"></span>
        <button class="btn-end" onclick="endConversation()">结束</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <button class="btn-mic" id="micBtn" onclick="toggleVoiceInput()" title="语音输入">🎤</button>
        <textarea id="chatInput" placeholder="说点什么..." rows="1"></textarea>
        <button class="btn-send" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <!-- VOICE (Mode B) -->
  <div class="view" id="view-voice">
    <div class="voice-view" style="flex:1">
      <div class="voice-phase" id="voicePhaseTag"></div>
      <div class="voice-avatar" id="voiceAvatar">J</div>
      <div class="voice-status" id="voiceStatus">准备开始</div>
      <div class="voice-animation" id="voiceAnimation">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <button class="voice-btn-end" onclick="endVoiceConversation()">结束对话</button>
    </div>
  </div>

  <!-- EVALUATION -->
  <div class="view" id="view-eval">
    <div class="eval-view" id="evalContent"></div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div class="history-view" style="flex:1;display:flex;flex-direction:column">
      <div class="search-bar">
        <input type="search" id="historySearch" placeholder="搜索话题、模式..." oninput="renderHistory()">
      </div>
      <div class="history-count" id="historyCount"></div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- HISTORY DETAIL -->
  <div class="view" id="view-detail">
    <div class="history-detail" id="detailContent"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')"><span class="icon">🏠</span>首页</button>
    <button class="nav-item" onclick="switchTab('history')"><span class="icon">📋</span>记录</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
// JS will be added in next task
</script>
</body>
</html>
